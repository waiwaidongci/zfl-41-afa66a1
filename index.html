<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手工鱼钩弯制工作室</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: #ffffff;
      --ink: #20242a;
      --muted: #68717d;
      --line: #d9d2c7;
      --blue: #27667b;
      --green: #4f7d52;
      --red: #a5423b;
      --gold: #b7812f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      padding: 22px 28px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf7;
    }
    h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
    .sub { color: var(--muted); margin-top: 6px; font-size: 14px; }
    main { padding: 20px 28px 32px; display: grid; gap: 18px; }
    .toolbar, .form, .stats, .board { display: grid; gap: 12px; }
    .toolbar {
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      align-items: end;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    label { display: grid; gap: 5px; font-size: 12px; color: var(--muted); }
    input, select, textarea, button {
      font: inherit;
      border-radius: 6px;
    }
    input, select, textarea {
      border: 1px solid var(--line);
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      min-width: 0;
    }
    textarea { min-height: 74px; resize: vertical; }
    button {
      border: 0;
      padding: 9px 11px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      min-height: 38px;
    }
    button.secondary { background: #59636d; }
    button.good { background: var(--green); }
    button.warn { background: var(--gold); }
    button.danger { background: var(--red); }
    .stats {
      grid-template-columns: repeat(7, minmax(92px, 1fr));
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .stat b { display: block; font-size: 22px; margin-top: 5px; }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 18px;
      align-items: start;
    }
    .form {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      position: sticky;
      top: 12px;
    }
    .form h2, .panel-title { margin: 0; font-size: 17px; }
    .board {
      grid-template-columns: repeat(7, minmax(170px, 1fr));
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .col {
      min-height: 360px;
      background: #fffefa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .col h3 {
      margin: 0 0 10px;
      display: flex;
      justify-content: space-between;
      font-size: 15px;
    }
    .card {
      background: var(--panel);
      border: 1px solid #ded8ce;
      border-left: 4px solid var(--blue);
      border-radius: 7px;
      padding: 10px;
      margin-bottom: 10px;
      display: grid;
      gap: 8px;
    }
    .card strong { font-size: 15px; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .row { display: flex; gap: 7px; flex-wrap: wrap; }
    .row button { flex: 1; min-width: 66px; padding: 7px 8px; font-size: 12px; }
    .empty { color: var(--muted); font-size: 13px; padding: 12px 4px; }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal[hidden] { display: none; }
    .modal-mask {
      position: absolute;
      inset: 0;
      background: rgba(32, 36, 42, 0.45);
    }
    .modal-panel {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      width: min(920px, 100%);
      max-height: 86vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf7;
    }
    .modal-body {
      padding: 16px 18px;
      overflow: auto;
    }
    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 18px;
      border-top: 1px solid var(--line);
      background: #fbfaf7;
    }
    .import-step { display: grid; gap: 14px; }
    .import-summary {
      padding: 10px 14px;
      background: #eef3ea;
      border: 1px solid #c9d8be;
      border-radius: 6px;
      color: #3b5a32;
      font-size: 13px;
    }
    .import-error {
      padding: 10px 14px;
      background: #f6e2e0;
      border: 1px solid #e0b6b1;
      border-radius: 6px;
      color: #7d2b25;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .preview-wrap {
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: auto;
      max-height: 52vh;
    }
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .preview-table th, .preview-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .preview-table th {
      position: sticky;
      top: 0;
      background: #fbfaf7;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
    }
    .preview-table tbody tr:last-child td { border-bottom: 0; }
    .preview-table tr.row-invalid { background: #fdf1ef; }
    .preview-table tr.row-valid { background: #f5faf1; }
    .status-ok { color: var(--green); font-weight: 600; }
    .status-err { color: var(--red); font-weight: 600; }
    .field-err { color: var(--red); }
    @media (max-width: 920px) {
      header { display: block; padding: 18px; }
      main { padding: 16px; }
      .toolbar, .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .form { position: static; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>手工鱼钩弯制工作室</h1>
      <div class="sub">剪料、退火、弯钩、淬火、回火、打磨、验收的批次闭环看板</div>
    </div>
    <div class="row">
      <button id="importBtn" class="warn">导入 JSON</button>
      <button id="exportBtn" class="secondary">导出 JSON</button>
    </div>
  </header>

  <main>
    <section class="toolbar">
      <label>按钩型筛选
        <select id="hookFilter"></select>
      </label>
      <label>按负责人筛选
        <select id="ownerFilter"></select>
      </label>
      <label>按工序筛选
        <select id="stageFilter"></select>
      </label>
      <button id="resetFilters" class="secondary">清空筛选</button>
    </section>

    <section id="stats" class="stats"></section>

    <section class="layout">
      <form id="batchForm" class="form">
        <h2>新增鱼钩批次</h2>
        <label>钢丝规格<input name="wire" required placeholder="0.7mm 高碳钢丝"></label>
        <label>目标钩型<input name="hook" required placeholder="袖钩 4 号"></label>
        <label>数量<input name="qty" type="number" min="1" required value="80"></label>
        <label>负责人<input name="owner" required placeholder="阿青"></label>
        <label>当前工序<select name="stage"></select></label>
        <label>缺陷数量<input name="defects" type="number" min="0" value="0"></label>
        <label>备注<textarea name="note" placeholder="退火火候、弯曲角度、打磨要求"></textarea></label>
        <button class="good" type="submit">加入看板</button>
      </form>

      <div>
        <h2 class="panel-title">工序看板</h2>
        <div id="board" class="board"></div>
      </div>
    </section>
  </main>

  <div id="importModal" class="modal" hidden>
    <div class="modal-mask"></div>
    <div class="modal-panel">
      <div class="modal-head">
        <h2 class="panel-title">批次导入</h2>
        <button id="closeImport" class="secondary">关闭</button>
      </div>
      <div class="modal-body">
        <div class="import-step" id="importStep1">
          <label>选择本地 JSON 文件
            <input id="importFile" type="file" accept="application/json,.json">
          </label>
          <p class="meta">文件内容应为批次数组，每批包含 wire（钢丝规格）、hook（钩型）、qty（数量）、owner（负责人）、stage（工序）、defects（缺陷数量）等字段。</p>
        </div>
        <div class="import-step" id="importStep2" hidden>
          <div id="importSummary" class="import-summary"></div>
          <div id="importError" class="import-error" hidden></div>
          <div class="preview-wrap">
            <table class="preview-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>钢丝规格</th>
                  <th>钩型</th>
                  <th>数量</th>
                  <th>负责人</th>
                  <th>工序</th>
                  <th>缺陷</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="previewBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button id="cancelImport" class="secondary">取消</button>
        <button id="confirmImport" class="good" disabled>确认导入</button>
      </div>
    </div>
  </div>

  <script>
    const stages = ["剪料", "退火", "弯钩", "淬火", "回火", "打磨", "验收"];
    const storageKey = "zfl41Batches";
    const seed = [
      { id: crypto.randomUUID(), wire: "0.8mm 蓝火钢丝", hook: "溪流倒刺 6 号", qty: 120, owner: "林师傅", stage: "弯钩", defects: 3, note: "弯嘴角度偏小的单独复查", history: ["创建批次", "推进到弯钩"] },
      { id: crypto.randomUUID(), wire: "1.0mm 高碳钢丝", hook: "海钓长柄 2 号", qty: 60, owner: "阿青", stage: "回火", defects: 1, note: "回火后抽检 12 枚", history: ["创建批次", "完成淬火"] },
      { id: crypto.randomUUID(), wire: "0.6mm 软调钢丝", hook: "袖钩 4 号", qty: 200, owner: "小孟", stage: "剪料", defects: 0, note: "先做样钩 10 枚", history: ["创建批次"] }
    ];
    let batches = JSON.parse(localStorage.getItem(storageKey) || "null") || seed;

    const form = document.querySelector("#batchForm");
    const board = document.querySelector("#board");
    const stats = document.querySelector("#stats");
    const hookFilter = document.querySelector("#hookFilter");
    const ownerFilter = document.querySelector("#ownerFilter");
    const stageFilter = document.querySelector("#stageFilter");

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(batches));
    }

    function options(select, values, allText) {
      const current = select.value;
      select.innerHTML = [`<option value="">${allText}</option>`]
        .concat(values.map(v => `<option value="${v}">${v}</option>`)).join("");
      if (values.includes(current)) select.value = current;
    }

    function refreshFilters() {
      options(hookFilter, [...new Set(batches.map(b => b.hook))], "全部钩型");
      options(ownerFilter, [...new Set(batches.map(b => b.owner))], "全部负责人");
      options(stageFilter, stages, "全部工序");
    }

    function filtered() {
      return batches.filter(item =>
        (!hookFilter.value || item.hook === hookFilter.value) &&
        (!ownerFilter.value || item.owner === ownerFilter.value) &&
        (!stageFilter.value || item.stage === stageFilter.value)
      );
    }

    function renderStats(list) {
      stats.innerHTML = stages.map(stage => {
        const total = list.filter(item => item.stage === stage).reduce((sum, item) => sum + Number(item.qty), 0);
        return `<div class="stat"><span>${stage}</span><b>${total}</b><span class="meta">枚在制</span></div>`;
      }).join("");
    }

    function move(id, offset) {
      const item = batches.find(b => b.id === id);
      const nextIndex = Math.max(0, Math.min(stages.length - 1, stages.indexOf(item.stage) + offset));
      item.stage = stages[nextIndex];
      item.history.push(`${new Date().toLocaleString()} 调整到 ${item.stage}`);
      save();
      render();
    }

    function defect(id) {
      const item = batches.find(b => b.id === id);
      item.defects += 1;
      item.history.push(`${new Date().toLocaleString()} 记录缺陷，总数 ${item.defects}`);
      save();
      render();
    }

    function removeBatch(id) {
      if (!confirm("确认删除这个批次？")) return;
      batches = batches.filter(b => b.id !== id);
      save();
      render();
    }

    function renderBoard(list) {
      board.innerHTML = stages.map(stage => {
        const cards = list.filter(item => item.stage === stage);
        return `<section class="col">
          <h3><span>${stage}</span><span>${cards.length}</span></h3>
          ${cards.length ? cards.map(item => `<article class="card">
            <strong>${item.hook}</strong>
            <div class="meta">钢丝：${item.wire}<br>数量：${item.qty} 枚 · 负责人：${item.owner}<br>缺陷：${item.defects} · 备注：${item.note || "无"}</div>
            <div class="meta">最近：${item.history[item.history.length - 1] || "创建"}</div>
            <div class="row">
              <button class="secondary" onclick="move('${item.id}', -1)">上一步</button>
              <button class="good" onclick="move('${item.id}', 1)">下一步</button>
              <button class="warn" onclick="defect('${item.id}')">缺陷+1</button>
              <button class="danger" onclick="removeBatch('${item.id}')">删除</button>
            </div>
          </article>`).join("") : `<div class="empty">暂无批次</div>`}
        </section>`;
      }).join("");
    }

    function render() {
      refreshFilters();
      const list = filtered();
      renderStats(list);
      renderBoard(list);
    }

    form.stage.innerHTML = stages.map(stage => `<option value="${stage}">${stage}</option>`).join("");
    form.addEventListener("submit", event => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());
      batches.unshift({
        id: crypto.randomUUID(),
        wire: data.wire,
        hook: data.hook,
        qty: Number(data.qty),
        owner: data.owner,
        stage: data.stage,
        defects: Number(data.defects || 0),
        note: data.note,
        history: [`${new Date().toLocaleString()} 创建批次`]
      });
      form.reset();
      form.qty.value = 80;
      form.defects.value = 0;
      save();
      render();
    });

    [hookFilter, ownerFilter, stageFilter].forEach(el => el.addEventListener("change", render));
    document.querySelector("#resetFilters").addEventListener("click", () => {
      hookFilter.value = "";
      ownerFilter.value = "";
      stageFilter.value = "";
      render();
    });
    document.querySelector("#exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(batches, null, 2)], { type: "application/json" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "fish-hook-batches.json";
      link.click();
      URL.revokeObjectURL(link.href);
    });

    window.move = move;
    window.defect = defect;
    window.removeBatch = removeBatch;

    const importModal = document.querySelector("#importModal");
    const importFile = document.querySelector("#importFile");
    const importStep1 = document.querySelector("#importStep1");
    const importStep2 = document.querySelector("#importStep2");
    const importSummary = document.querySelector("#importSummary");
    const importError = document.querySelector("#importError");
    const previewBody = document.querySelector("#previewBody");
    const confirmImportBtn = document.querySelector("#confirmImport");

    let pendingImport = null;

    function openImport() {
      pendingImport = null;
      importFile.value = "";
      importStep1.hidden = false;
      importStep2.hidden = true;
      importError.hidden = true;
      confirmImportBtn.disabled = true;
      importModal.hidden = false;
    }

    function closeImport() {
      importModal.hidden = true;
    }

    function validateBatch(item, index) {
      const errors = [];
      if (!item || typeof item !== "object") {
        return { valid: false, errors: ["不是有效的对象"] };
      }
      if (!item.wire || typeof item.wire !== "string" || !item.wire.trim()) {
        errors.push("钢丝规格不能为空");
      }
      if (!item.hook || typeof item.hook !== "string" || !item.hook.trim()) {
        errors.push("钩型不能为空");
      }
      const qty = Number(item.qty);
      if (!Number.isFinite(qty) || qty <= 0 || !Number.isInteger(qty)) {
        errors.push("数量必须为正整数");
      }
      if (!item.owner || typeof item.owner !== "string" || !item.owner.trim()) {
        errors.push("负责人不能为空");
      }
      if (!item.stage || typeof item.stage !== "string" || !stages.includes(item.stage)) {
        errors.push(`工序必须为：${stages.join("、")}`);
      }
      const defects = Number(item.defects);
      if (!Number.isFinite(defects) || defects < 0 || !Number.isInteger(defects)) {
        errors.push("缺陷数量必须为非负整数");
      }
      return { valid: errors.length === 0, errors };
    }

    function cell(text, hasErr) {
      if (hasErr) {
        return `<td class="field-err">${text ?? ""}</td>`;
      }
      return `<td>${text ?? ""}</td>`;
    }

    function renderPreview(list, results) {
      const validCount = results.filter(r => r.valid).length;
      const invalidCount = results.length - validCount;
      importSummary.textContent = `共 ${results.length} 条记录，有效 ${validCount} 条，无效 ${invalidCount} 条。`;
      if (invalidCount > 0) {
        importError.hidden = false;
        importError.textContent = results
          .map((r, i) => r.valid ? null : `第 ${i + 1} 行：${r.errors.join("；")}`)
          .filter(Boolean)
          .join("\n");
        confirmImportBtn.disabled = true;
      } else {
        importError.hidden = true;
        confirmImportBtn.disabled = false;
      }
      previewBody.innerHTML = list.map((item, i) => {
        const r = results[i];
        const rowClass = r.valid ? "row-valid" : "row-invalid";
        const status = r.valid
          ? `<span class="status-ok">有效</span>`
          : `<span class="status-err">${r.errors.join("；")}</span>`;
        return `<tr class="${rowClass}">
          <td>${i + 1}</td>
          ${cell(item?.wire, !r.valid && r.errors.some(e => e.includes("钢丝")))}
          ${cell(item?.hook, !r.valid && r.errors.some(e => e.includes("钩型")))}
          ${cell(item?.qty, !r.valid && r.errors.some(e => e.includes("数量")))}
          ${cell(item?.owner, !r.valid && r.errors.some(e => e.includes("负责人")))}
          ${cell(item?.stage, !r.valid && r.errors.some(e => e.includes("工序")))}
          ${cell(item?.defects, !r.valid && r.errors.some(e => e.includes("缺陷")))}
          <td>${status}</td>
        </tr>`;
      }).join("");
    }

    importFile.addEventListener("change", async () => {
      const file = importFile.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!Array.isArray(data)) {
          throw new Error("JSON 内容必须是数组");
        }
        const results = data.map((item, i) => validateBatch(item, i));
        pendingImport = data;
        importStep1.hidden = true;
        importStep2.hidden = false;
        renderPreview(data, results);
      } catch (err) {
        importStep1.hidden = false;
        importStep2.hidden = true;
        importError.hidden = false;
        importError.textContent = `解析失败：${err.message}`;
        pendingImport = null;
        confirmImportBtn.disabled = true;
      }
    });

    confirmImportBtn.addEventListener("click", () => {
      if (!pendingImport) return;
      const validItems = pendingImport
        .map(item => validateBatch(item))
        .map((r, i) => r.valid ? pendingImport[i] : null)
        .filter(Boolean);
      const now = new Date().toLocaleString();
      validItems.forEach(item => {
        batches.unshift({
          id: crypto.randomUUID(),
          wire: String(item.wire).trim(),
          hook: String(item.hook).trim(),
          qty: Number(item.qty),
          owner: String(item.owner).trim(),
          stage: item.stage,
          defects: Number(item.defects || 0),
          note: item.note ? String(item.note) : "",
          history: [`${now} 导入创建批次`]
        });
      });
      save();
      render();
      closeImport();
    });

    document.querySelector("#importBtn").addEventListener("click", openImport);
    document.querySelector("#closeImport").addEventListener("click", closeImport);
    document.querySelector("#cancelImport").addEventListener("click", closeImport);
    document.querySelector(".modal-mask").addEventListener("click", closeImport);

    save();
    render();
  </script>
</body>
</html>
